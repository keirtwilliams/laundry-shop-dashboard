<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>

    <article class="main-wrapper">

               <div class="button-container">
                 <a href="/html/addForm.html" class="button-link" id="showForm">Add Order</a>
               </div>

       <table class="order-table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Service</th>
                <th>Weight</th>
                <th>Total</th>
                <th>Payment</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody id="order-list">
            </tbody>
        </table>
</article>

  <div class="cards">
            <div class="box">
                <h1>Total Orders</h1>
                <p id="total-orders">
                </p>
               </div>

                 <div class="box">
                <h1>Total Revenue</h1>
               <p id="total-revenue">
               </p>
               </div>

                 <div class="box">
                <h1>Orders in Progress</h1>
                <p id="total-progress">   
                </p>
                </div>
        </div>
        
      <script src="/js/script.js"></script>
</body>
</html>
